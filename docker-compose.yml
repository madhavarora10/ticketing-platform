
services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow
      POSTGRES_DB: ticketflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticketflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ticketflow-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ticketflow:ticketflow@postgres:5432/ticketflow
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 4000
      WEB_URL: http://localhost:3000
      ADMIN_API_KEY: change-me-in-production
      DEMAND_THRESHOLD: "10"
      TIME_WEIGHT: "1.0"
      DEMAND_WEIGHT: "1.0"
      INVENTORY_WEIGHT: "1.0"
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ticketflow-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
